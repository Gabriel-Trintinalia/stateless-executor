participants_matrix:
  el:
    - el_type: besu
      el_image: hyperledger/besu:26.6-develop-fc46729
  cl:
    - cl_type: lighthouse
      cl_image: ethpandaops/lighthouse:bal-devnet-7
      supernode: true

network_params:
  preset: minimal
  seconds_per_slot: 6
  genesis_delay: 30
  fulu_fork_epoch: 0
  gloas_fork_epoch: 2
  genesis_gaslimit: 150000000
  gas_limit: 150000000
snooper_enabled: true
dora_params:
  image: ethpandaops/dora:eip7928-support

additional_services:
  - spamoor
  - dora

spamoor_params:
  image: ethpandaops/spamoor:master
  max_mem: 4000
  spammers:
    - scenario: eoatx
      config:
        throughput: 1
    - scenario: blobs
      config:
        throughput: 1
